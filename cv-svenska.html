<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelrahim Elhaj — CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fbfbfd;
        }
        .apple-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .hero-gradient {
            background: linear-gradient(180deg, #1d1d1f 0%, #2c2c2e 100%);
        }
        .skill-tag {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            font-size: 11px;
        }
        .section-label {
            color: #86868b;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .lang-toggle {
            position: absolute;
            top: 16px;
            right: 20px;
            display: flex;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 3px;
            gap: 2px;
            z-index: 50;
        }
        .lang-btn {
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
            border: none;
            background: transparent;
        }
        .lang-btn.active {
            background: white;
            color: #1d1d1f;
        }
        .lang-btn:not(.active):hover {
            color: rgba(255,255,255,0.85);
        }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; margin: 0; padding: 0; font-size: 12px; }
            .hero-gradient {
                background: linear-gradient(180deg, #1d1d1f 0%, #2c2c2e 100%) !important;
                padding: 20px 0 !important;
            }
            .lang-toggle { display: none !important; }
            .apple-card {
                box-shadow: none !important;
                border: 1px solid #eee !important;
                margin-bottom: 10px !important;
                break-inside: avoid;
            }
            .max-w-4xl {
                max-width: 100% !important;
                padding: 10px 16px !important;
                margin-top: -6px !important;
            }
            footer { display: none !important; }
            .p-5, .md\:p-6 { padding: 10px !important; }
            .pb-8 { padding-bottom: 0 !important; }
            .apple-card p, .apple-card li, .apple-card span {
                font-size: 11px !important;
                line-height: 1.55 !important;
            }
            h3 { font-size: 12px !important; }
            h4 { font-size: 11px !important; }
            .grid { gap: 8px !important; }
            #profile-img-container { width: 72px !important; height: 72px !important; }
            .text-3xl { font-size: 22px !important; }
            .text-sm { font-size: 11px !important; }
            .gap-4 { gap: 10px !important; }
            .space-y-3 > * + * { margin-top: 8px !important; }
        }
    </style>
</head>
<body class="text-gray-900 flex flex-col min-h-screen">

<div class="hero-gradient py-10 flex items-center justify-center relative overflow-hidden">

    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" id="btn-sv" onclick="setLang('sv')">SV</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="text-center text-white px-6 relative z-10">
        <div id="profile-img-container" class="w-28 h-28 mx-auto mb-3 rounded-full overflow-hidden border-2 border-white/20 shadow-xl">
            <img src="profile.jpg" alt="Abdelrahim" class="w-full h-full object-cover">
        </div>
        <h1 class="text-3xl font-semibold mb-1 tracking-tight">Abdelrahim Elhaj</h1>
        <p class="text-sm text-gray-400 mb-3 font-light" id="hero-title"></p>
        <div class="flex flex-wrap justify-center gap-4 text-xs text-gray-400">
            <span id="loc-span"><i class="fas fa-map-marker-alt mr-1.5"></i><span id="loc-text"></span></span>
            <span><i class="fas fa-phone mr-1.5"></i>+46 762 981 389</span>
            <span><i class="fas fa-envelope mr-1.5"></i>abdalraheem.saif7777@gmail.com</span>
        </div>
    </div>
</div>

<div class="max-w-4xl mx-auto px-6 -mt-6 relative z-20 pb-8 flex-grow w-full space-y-3">

    <!-- About -->
    <div class="apple-card p-5 md:p-6">
        <p class="section-label mb-1" id="lbl-about"></p>
        <p class="text-xs text-gray-600 leading-relaxed font-light" id="about-text"></p>
    </div>

    <!-- Experience -->
    <div class="apple-card p-5 md:p-6">
        <p class="section-label mb-3" id="lbl-exp"></p>
        <div class="border-l border-gray-200 pl-5 ml-1">
            <div class="relative">
                <div class="absolute -left-[25px] w-2 h-2 bg-black rounded-full mt-1.5"></div>
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-baseline mb-0.5">
                    <h3 class="text-sm font-medium text-gray-900" id="exp-title"></h3>
                    <span class="text-xs text-gray-400" id="exp-period"></span>
                </div>
                <p class="text-[11px] text-blue-600 mb-1.5 font-medium">FBK Balkan · Malmö</p>
                <ul class="space-y-0.5 text-xs text-gray-600 font-light list-disc list-inside" id="exp-bullets"></ul>
            </div>
        </div>
    </div>

    <!-- Projects -->
    <div class="apple-card p-5 md:p-6" id="projects-section"></div>

    <!-- Education + Languages -->
    <div class="grid md:grid-cols-2 gap-3">
        <div class="apple-card p-5 md:p-6" id="education-section"></div>
        <div class="apple-card p-5 md:p-6" id="languages-section"></div>
    </div>

    <!-- Skills -->
    <div class="apple-card p-5 md:p-6" id="skills-section"></div>

    <!-- Interests -->
    <div class="apple-card p-5 md:p-6" id="interests-section"></div>

</div>

<footer class="text-center py-4 text-gray-400 text-xs mt-auto">
    <p>© 2026 Abdelrahim Elhaj</p>
</footer>

                    ]
                }
            ],

            ],
            languages: [

                { name: "Engelska", level: "Flytande" },
                { name: "Arabiska", level: "Modersmål" }
            ],
            interests: [
                { title: "AI & Automation", desc: "Utforskar generativa utvecklingsverktyg och skriptar arbetsflöden i Python.", icon: "robot" },
                { title: "Öppen källkod", desc: "Intresserad av systemscheman, spelmotorarkitektur och community-drivna projekt.", icon: "code" }
            ]
        },
        en: {
            title: "Fullstack Developer",
            location: "Malmö, Sweden",
            about: "Ambitious Fullstack Developer student with a solid foundation in IT and practical experience in agile web development. Proficient in Java, Spring Boot, and modern frontend tools, with a strong interest in AI integration and scalable web applications.",
            labels: {
                about: "About Me",
                exp: "Experience",
                projects: "Projects",
                edu: "Education",
                lang: "Languages",
                skills: "Skills & Competencies",

            },

                bullets: [

                {

                    ]
                },
                {

                    ]
                }
            ],
            education: [
                { title: "Fullstack Developer", school: "Teknikhögskolan · Lund", period: "Aug 2024 – May 2026" },

            ],
            languages: [
                { name: "Swedish", level: "Professional" },
                { name: "English", level: "Fluent" },
                { name: "Arabic", level: "Native" }
            ],
            interests: [
                { title: "AI & Automation", desc: "Exploring generative developer tools and scripting automated workflows in Python.", icon: "robot" },
                { title: "Open Source", desc: "Interested in system internals, game engine architectures, and community-driven projects.", icon: "code" }
            ]
        }
    };

    const skillKeys = ["languages", "frameworks", "databases", "tools"];
    const skillData = {
        languages: ["Java (OOP)", "JavaScript (ES6+)", "TypeScript", "HTML5", "CSS3"],
        frameworks: ["Spring Boot", "React", "Node.js", "Next.js"],
        databases: ["PostgreSQL", "MySQL", "SQLite"],
        tools: ["Docker", "Git/GitHub", "Postman", "Agile/Scrum"]
    };

    function setLang(lang) {
        const d = CV[lang];

        // Toggle buttons
        document.getElementById('btn-sv').classList.toggle('active', lang === 'sv');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.documentElement.lang = lang;

        // Header
        document.getElementById('hero-title').textContent = d.title;
        document.getElementById('loc-text').textContent = d.location;

        // About
        document.getElementById('lbl-about').textContent = d.labels.about;
        document.getElementById('about-text').textContent = d.about;

        // Experience
        document.getElementById('lbl-exp').textContent = d.labels.exp;
        document.getElementById('exp-title').textContent = d.exp.title;
        document.getElementById('exp-period').textContent = d.exp.period;
        document.getElementById('exp-bullets').innerHTML = d.exp.bullets.map(b => `<li>${b}</li>`).join('');

        // Projects
        document.getElementById('projects-section').innerHTML = `
        <p class="section-label mb-2">${d.labels.projects}</p>
        <div class="grid md:grid-cols-3 gap-3">
            ${d.projects.map(p => `
                <div class="p-3 bg-gray-50 rounded-xl">
                    <h3 class="text-xs font-semibold mb-0.5 text-gray-900">${p.name}</h3>
                    <p class="text-[10px] text-blue-600 mb-1.5 font-medium">${p.desc}</p>
                    <ul class="text-[10px] text-gray-500 space-y-0.5 font-light">
                        ${p.details.map(item => `<li>• ${item}</li>`).join('')}
                    </ul>
                </div>
            `).join('')}
        </div>`;

        // Education
        document.getElementById('education-section').innerHTML = `
        <p class="section-label mb-2">${d.labels.edu}</p>
        <div class="space-y-2">
            ${d.education.map((e, i) => `
                <div class="pb-1.5 ${i < d.education.length - 1 ? 'border-b border-gray-100' : ''}">
                    <h3 class="text-xs font-semibold text-gray-900">${e.title}</h3>
                    <p class="text-[10px] text-gray-500 font-light">${e.school}</p>
                    <span class="text-[10px] text-gray-400">${e.period}</span>
                </div>
            `).join('')}
        </div>`;

        // Languages
        document.getElementById('languages-section').innerHTML = `
        <p class="section-label mb-2">${d.labels.lang}</p>
        <div class="grid grid-cols-2 gap-2">
            ${d.languages.map(l => `
                <div class="p-2 bg-gray-50 rounded-xl text-center">
                    <h4 class="text-xs font-semibold text-gray-900">${l.name}</h4>
                    <p class="text-[10px] text-gray-500">${l.level}</p>
                </div>
            `).join('')}
        </div>`;

        // Skills
        document.getElementById('skills-section').innerHTML = `
        <p class="section-label mb-2">${d.labels.skills}</p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            ${skillKeys.map((key, idx) => `
                <div>
                    <h4 class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1">${d.labels.skillGroups[idx]}</h4>
                    <div class="flex flex-wrap gap-1">
                        ${skillData[key].map(s => `<span class="skill-tag px-2 py-0.5 rounded-md">${s}</span>`).join('')}
                    </div>
                </div>
            `).join('')}
        </div>`;

        // Interests
        document.getElementById('interests-section').innerHTML = `
        <p class="section-label mb-2">${d.labels.interests}</p>
        <div class="grid md:grid-cols-2 gap-3">
            ${d.interests.map(i => `
                <div class="flex items-center gap-3 p-1.5 bg-gray-50/50 rounded-xl">
                    <div class="w-7 h-7 bg-gray-100 rounded-lg flex items-center justify-center text-xs flex-shrink-0">
                        <i class="fas fa-${i.icon}"></i>
                    </div>
                    <div>
                        <h4 class="text-xs font-semibold text-gray-900">${i.title}</h4>
                        <p class="text-[10px] text-gray-500 font-light">${i.desc}</p>
                    </div>
                </div>
            `).join('')}
        </div>`;

        // Save preference
        localStorage.setItem('cv-lang', lang);
    }

    // Init: check localStorage or default to sv
    const savedLang = localStorage.getItem('cv-lang') || 'sv';
    setLang(savedLang);
</script>
</body>
</html>
